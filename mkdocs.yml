site_name: reinGraph
site_description: 把多个 rein agent 编排成有状态的图工作流 —— 条件、循环、并行、HITL,内核复用 rein。
site_author: Rein Authors
site_url: https://malunan.github.io/rein-graph/
repo_url: https://github.com/MaLunan/rein-graph

docs_dir: website
site_dir: site

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换到深色
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - 首页: index.md
  - 快速开始: getting-started.md
  - 核心概念: concepts.md
  - 指南:
    - 顺序流水线: guides/sequential.md
    - 条件分支与循环: guides/control-flow.md
    - 并行扇出与汇合: guides/parallel.md
    - 图级人工审批(HITL): guides/hitl.md
    - 子图: guides/subgraph.md
    - 可视化: guides/visualization.md
  - 设计哲学(复用 rein): design.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MaLunan
  generator: false
